name: generate 3d contribution profile

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Generate 3d contribution art
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate 3d contribution assets
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated assets
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-3d-contrib
          git commit -m "generated 3d contribution assets" || exit 0
          git push
