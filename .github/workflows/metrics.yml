name: generate metrics

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile/**"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate indepth language metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: profile/metrics.plugin.languages.indepth.svg
          base: ""
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_threshold: 2%
          plugin_languages_other: yes
          plugin_languages_categories: programming, markup, data
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 20
          plugin_languages_analysis_timeout_repositories: 10
          commits_authoring: Christopher Banas, Chris Banas, chrisbanas, banaschg@gmail.com

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/metrics.plugin.languages.indepth.svg
          git commit -m "Update metrics assets" || exit 0
          git push
