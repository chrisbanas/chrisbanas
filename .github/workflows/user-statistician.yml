name: generate stack card

concurrency:
  group: profile-assets
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile/**"

permissions:
  contents: write

jobs:
  stack:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate language distribution card
        uses: cicirello/user-statistician@v1
        with:
          image-file: profile/languages.svg
          custom-title: Stack
          include-title: false
          hide-keys: general, repositories, contributions
          category-order: languages
          max-languages: 8
          animated-language-chart: true
          colors: dark
          image-width: 720
          commit-and-push: false
          commit-message: "Update stack card"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/languages.svg
          git commit -m "Update stack card" || exit 0
          git pull --rebase origin main
          git push
