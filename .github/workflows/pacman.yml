name: generate pacman animation

concurrency:
  group: profile-assets
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile/**"

permissions:
  contents: write

jobs:
  generate:
    name: Update pacman graph
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate pacman contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Copy generated assets into repository
        run: |
          mkdir -p profile
          cp dist/pacman-contribution-graph.svg profile/pacman-contribution-graph.svg
          cp dist/pacman-contribution-graph-dark.svg profile/pacman-contribution-graph-dark.svg

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/pacman-contribution-graph.svg profile/pacman-contribution-graph-dark.svg
          git commit -m "Update pacman contribution graph" || exit 0
          git pull --rebase origin main
          git push
